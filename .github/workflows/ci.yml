name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io

# Cancel any in-progress run for the same branch/PR to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Code Quality ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv --python ${{ env.PYTHON_VERSION }}
      - run: uv pip install -e ".[dev]"
      - name: Run ruff linter
        run: uv run ruff check src/ tests/
      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # ⚠ Fix from original: uv python install was missing in this job
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv --python ${{ env.PYTHON_VERSION }}
      - run: uv pip install -e ".[dev]"
      - name: Run mypy
        run: uv run mypy src/platform/
        # Non-blocking: pre-existing type errors in the codebase should not
        # block deploys. Fix incrementally. Remove this flag when errors are cleared.
        continue-on-error: true

  # ─── Tests ───────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv --python ${{ env.PYTHON_VERSION }}
      - run: uv pip install -e ".[dev]"

      - name: Run DB migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://atlas:atlas@localhost:5432/atlas_test

      - name: Run unit tests
        run: uv run pytest tests/unit -v --cov=platform --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://atlas:atlas@localhost:5432/atlas_test
          REDIS_URL: redis://localhost:6379/0
          ENV: test
          SECRET_KEY: ci-secret-key-at-least-16-chars-long
          BRIDGE_AUTH_TOKEN: ci-bridge-token

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests (Advisory)
    runs-on: ubuntu-latest
    # Non-blocking — failures won't block PRs but are reported
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv --python ${{ env.PYTHON_VERSION }}
      - run: uv pip install -e ".[dev]"

      - name: Run DB migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://atlas:atlas@localhost:5432/atlas_test

      - name: Run integration tests
        run: uv run pytest tests/integration -v
        env:
          DATABASE_URL: postgresql+asyncpg://atlas:atlas@localhost:5432/atlas_test
          REDIS_URL: redis://localhost:6379/0
          ENV: test
          SECRET_KEY: ci-secret-key-at-least-16-chars-long
          BRIDGE_AUTH_TOKEN: ci-bridge-token

  # ─── Security ────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv --python ${{ env.PYTHON_VERSION }}
      - run: uv pip install -e ".[dev]"

      - name: Run pip-audit (dependency CVEs)
        run: uv run pip-audit --strict
        continue-on-error: true

      - name: Run bandit (static code security)
        run: |
          uv run bandit -r src/platform/ -ll -f sarif -o bandit-report.sarif || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-report.sarif
        continue-on-error: true

  # ─── Build & Push Images ─────────────────────────────────────────────────────
  build-images:
    name: Build & Push Docker Images
    needs: [lint, typecheck, unit-tests]
    runs-on: ubuntu-latest
    # Only push images on main branch merges or version tag pushes
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/atlas-api
          # Tag strategy:
          #   - main push    → sha-<short-sha>, latest
          #   - v1.2.3 tag   → v1.2.3, 1.2, 1, latest
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push atlas-api image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache — dramatically speeds up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/atlas-api
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Print image summary
        run: |
          echo "### 🐳 Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository }}/atlas-api\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | while read tag; do
            echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
