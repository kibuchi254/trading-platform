worker_processes auto;
events { worker_connections 4096; }

http {
    upstream atlas_api { server api:8000; }
    upstream atlas_bridge { server bridge:9000; }

    # Rate limit zone: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # REST API
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://atlas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoints (ticks, terminal-events)
        location /ws/ {
            proxy_pass http://atlas_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # MT5 Bridge WebSocket (terminals connect here)
        location /bridge/ {
            proxy_pass http://atlas_bridge/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Health
        location /health { proxy_pass http://atlas_api/health; }

        # Docs (dev only)
        location / { proxy_pass http://atlas_api; }
    }
}
