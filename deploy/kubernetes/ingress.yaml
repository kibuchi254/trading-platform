# ATLAS Ingress — TLS termination + WebSocket routing
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress
  namespace: atlas
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: "atlas-api,atlas-bridge"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.atlas.example.com
        - bridge.atlas.example.com
      secretName: atlas-tls
  rules:
    - host: api.atlas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlas-api
                port:
                  number: 80
    - host: bridge.atlas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlas-bridge
                port:
                  number: 9000
