# ATLAS API — Kubernetes deployment + service + HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-api
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-api
    spec:
      containers:
        - name: api
          # Image tag is substituted by CI/CD (cd.yml) via sed before apply.
          # Format: ghcr.io/<org>/atlas-api:<sha-short> (staging) or <semver> (prod)
          image: ghcr.io/__REGISTRY__/atlas-api:__IMAGE_TAG__
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-api
  namespace: atlas
spec:
  selector:
    app.kubernetes.io/name: atlas-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: atlas-api
  namespace: atlas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: atlas-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: atlas-api-pdb
  namespace: atlas
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-api
