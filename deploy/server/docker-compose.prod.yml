# ATLAS — Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# This file is used by GitHub Actions (cd.yml) for automated deployments.
# It is copied to the server at /opt/atlas/ on every deploy.
#
# The IMAGE_TAG, REGISTRY, and GITHUB_REPOSITORY variables are injected by CI.
# All application secrets come from /opt/atlas/.env on the server.
#
# One-time server setup: run deploy/server/setup.sh as root.
# ─────────────────────────────────────────────────────────────────────────────

x-app-image: &app-image
  image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY}/atlas-api:${IMAGE_TAG:-latest}

x-app-base: &app-base
  <<: *app-image
  restart: unless-stopped
  env_file: ../../.env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do NOT expose 5432 externally in production
    expose:
      - "5432"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Application Services ─────────────────────────────────────────────────
  api:
    <<: *app-base
    ports:
      - "0.0.0.0:2847:8000"   # External app port 2847 → internal API port 8000
    command: >
      uvicorn platform.main:app
      --host 0.0.0.0 --port 8000
      --workers 4 --loop uvloop --http httptools
      --proxy-headers --forwarded-allow-ips="*"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bridge:
    <<: *app-base
    depends_on:
      redis:
        condition: service_started
    ports:
      - "0.0.0.0:2848:9000"   # External app port 2848 → internal bridge port 9000
    command: python -m platform.bridge.server --host 0.0.0.0 --port 9000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 9000)); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    <<: *app-base
    command: >
      celery -A platform.infrastructure.celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=1000
    healthcheck:
      test: ["CMD", "celery", "-A", "platform.infrastructure.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    env_file: ../../.env
    ports:
      - "127.0.0.1:5555:5555"   # Loopback only — protect with nginx auth
    command: celery --broker=${CELERY_BROKER_URL} flower --port=5555
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Observability ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana-oss:11.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=${GRAFANA_URL:-http://localhost:3000}
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Reverse Proxy ────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # Mount TLS certs (or use Certbot volume)
      - certbot_www:/var/www/certbot:ro  # For Let's Encrypt HTTP challenge
    depends_on:
      api:
        condition: service_healthy
      bridge:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  certbot_www:
